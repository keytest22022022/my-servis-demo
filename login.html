<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MY SERVIS Admin - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 24rem;
            width: 100%;
            padding: 0 1rem;
        }
        .login-box {
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 2.5rem 2rem;
        }
        .logo-icon {
            width: 4rem;
            height: 4rem;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.5rem;
            color: #fff;
            box-shadow: 0 4px 14px rgba(37,99,235,0.4);
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .login-subtitle {
            color: #6b7280;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.375rem;
        }
        .form-input {
            display: block;
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: #111827;
            background: #f9fafb;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
            background: #fff;
        }
        .form-input::placeholder { color: #9ca3af; }
        .login-btn {
            display: block;
            width: 100%;
            padding: 0.75rem 1rem;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #fff;
            font-size: 0.9375rem;
            font-weight: 600;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 14px rgba(37,99,235,0.35);
            margin-top: 0.5rem;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37,99,235,0.45);
        }
        .login-btn:active { transform: translateY(0); }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: rgba(255,255,255,0.6);
            font-size: 0.875rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-box">
            <div class="logo-icon">🔧</div>
            <h1 class="login-title">MY SERVIS</h1>
            <p class="login-subtitle">Admin Panel</p>

            <form onsubmit="window.location.href='index.html'; return false;">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" name="email" type="email" required autofocus
                        class="form-input"
                        placeholder="admin@myservis.com">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" required
                        class="form-input"
                        placeholder="••••••••">
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>

        <!-- <div class="back-link">
            <a href="../">← Back to MY SERVIS</a>
        </div> -->
    </div>
</body>
</html>
