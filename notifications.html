<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlueTreex Admin - Notifications</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="flex min-h-screen">
        <aside class="w-64 bg-gray-900 text-white flex-shrink-0">
            <div class="p-4 border-b"><h1 class="text-xl font-bold">BlueTreex</h1><p class="text-gray-400 text-xs">Admin Panel</p></div>
            <nav class="p-4 space-y-1">
                <a href="index.html" class="block px-3 py-2 rounded-lg hover-bg-gray-800"><span class="mr-3"><i class="fas fa-chart-line"></i></span> Dashboard</a>
                <a href="users.html" class="block px-3 py-2 rounded-lg hover-bg-gray-800"><span class="mr-3"><i class="fas fa-users"></i></span> Users</a>
                <a href="contractors.html" class="block px-3 py-2 rounded-lg hover-bg-gray-800"><span class="mr-3"><i class="fas fa-building"></i></span> Contractors</a>
                <a href="categories.html" class="block px-3 py-2 rounded-lg hover-bg-gray-800"><span class="mr-3"><i class="fas fa-tags"></i></span> Categories</a>
                <a href="locations.html" class="block px-3 py-2 rounded-lg hover-bg-gray-800"><span class="mr-3"><i class="fas fa-map-marker-alt"></i></span> Locations</a>
                <a href="reviews.html" class="block px-3 py-2 rounded-lg hover-bg-gray-800"><span class="mr-3"><i class="fas fa-star"></i></span> Reviews</a>
                <a href="reports.html" class="block px-3 py-2 rounded-lg hover-bg-gray-800"><span class="mr-3"><i class="fas fa-chart-bar"></i></span> Reports</a>
                <a href="subscriptions.html" class="block px-3 py-2 rounded-lg hover-bg-gray-800"><span class="mr-3"><i class="fas fa-credit-card"></i></span> Subscriptions</a>
                <a href="notifications.html" class="block px-3 py-2 rounded-lg bg-blue-600"><span class="mr-3"><i class="fas fa-bell"></i></span> Notifications</a>
            </nav>
        </aside>
        <div class="flex-1 flex flex-col">
            <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6">
                <h2 class="text-lg font-semibold text-gray-800">Push Notifications & Settings</h2>
                <div class="header-actions flex items-center gap-3">
                    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode"><i class="fas fa-moon"></i></button>
                    <div class="user-dropdown">
                        <button onclick="toggleUserMenu()" class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-lg cursor-pointer">
                            <span class="w-7 h-7 bg-blue-600 text-white rounded-full flex items-center justify-center text-xs font-bold">A</span>
                            <span class="text-sm font-medium text-gray-700">Admin</span>
                            <i class="fas fa-chevron-down text-xs text-gray-400"></i>
                        </button>
                        <div id="userMenu" class="user-dropdown-menu">
                            <a href="login.html" class="signout"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
                        </div>
                    </div>
                </div>
            </header>
            <main class="flex-1 p-6">
                <div class="grid lg-grid-cols-2 gap-6">
                    <!-- Send Notification -->
                    <div class="bg-white rounded-lg shadow-sm p-6">
                        <h3 class="text-lg font-semibold text-gray-900 mb-4">Send Push Notification</h3>
                        <p class="text-sm text-gray-500 mb-4">Send a push notification to all 1,234 users.</p>
                        <div class="space-y-4">
                            <div><label class="block text-sm font-medium text-gray-700">Title</label><input type="text"></div>
                            <div><label class="block text-sm font-medium text-gray-700">Message</label><textarea rows="4"></textarea></div>
                            <button class="w-full btn btn-blue">Send Notification</button>
                        </div>
                    </div>

                    <!-- Settings -->
                    <div class="space-y-6">
                        <div class="bg-white rounded-lg shadow-sm p-6">
                            <h3 class="text-lg font-semibold text-gray-900 mb-4">Notification Settings</h3>
                            <div class="space-y-4">
                                <label class="flex items-center justify-between"><span class="text-gray-700">New Lead Notifications</span><input type="checkbox" checked></label>
                                <label class="flex items-center justify-between"><span class="text-gray-700">New Review Notifications</span><input type="checkbox" checked></label>
                                <label class="flex items-center justify-between"><span class="text-gray-700">Contractor Registration Alerts</span><input type="checkbox" checked></label>
                                <label class="flex items-center justify-between"><span class="text-gray-700">Daily Summary Email</span><input type="checkbox"></label>
                            </div>
                        </div>
                        <div class="bg-white rounded-lg shadow-sm p-6">
                            <h3 class="text-lg font-semibold text-gray-900 mb-4">Platform Settings</h3>
                            <div class="space-y-4">
                                <div><label class="block text-sm font-medium text-gray-700">Platform Name</label><input type="text" value="BlueTreex"></div>
                                <div><label class="block text-sm font-medium text-gray-700">Support Email</label><input type="email" value="support@bluetreex.com"></div>
                                <button class="w-full btn btn-gray">Save Settings</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script>
        function toggleUserMenu() { var menu = document.getElementById('userMenu'); menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; } document.addEventListener('click', function(e) { if (!e.target.closest('.user-dropdown')) { var menu = document.getElementById('userMenu'); if (menu) menu.style.display = 'none'; } }); function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.querySelector('.theme-toggle').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }
        (function() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.body.classList.add('dark');
                const btn = document.querySelector('.theme-toggle');
                if (btn) btn.innerHTML = '<i class="fas fa-sun"></i>';
            }
        })();
    </script>
</body>
</html>
